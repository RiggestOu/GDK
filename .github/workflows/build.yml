name: Build EPUBReader.opk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 允许 CI 把产物推回仓库的 build 分支（git 交付，绕开被墙的 GitHub 下载 CDN）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenDingux gcw0 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xz-utils curl
          # 注意：发布标签是 od-2022.09.22（点），但工具链包名用的是 2022-09-22（连字符）
          TC_URL="https://github.com/OpenDingux/buildroot/releases/download/od-2022.09.22/opendingux-gcw0-toolchain.2022-09-22.tar.xz"
          echo "==> Downloading toolchain: $TC_URL"
          curl -fL --retry 5 --retry-delay 5 -C - -o /tmp/tc.tar.xz "$TC_URL"
          echo "==> Downloaded file:"; ls -lh /tmp/tc.tar.xz
          # 体积校验：工具链约 150MB，小于 10MB 视为下载失败
          SIZE=$(stat -c%s /tmp/tc.tar.xz 2>/dev/null || echo 0)
          echo "==> File size bytes: $SIZE"
          if [ "$SIZE" -lt 10485760 ]; then
            echo "!! ERROR: toolchain download too small, aborting"; exit 1
          fi
          sudo tar -xJf /tmp/tc.tar.xz -C /opt
          sudo chmod -R a+rX /opt/gcw0-toolchain
          echo "==> Toolchain binaries:"; ls /opt/gcw0-toolchain/bin | head

      - name: Build & package .opk
        run: |
          set -o pipefail
          cd src
          # Windows 提交的脚本在 Linux checkout 后可能无 +x 或带 CRLF，先规范化再用 bash 调用
          sed -i 's/\r$//' package.sh 2>/dev/null || true
          bash ./package.sh 2>&1 | tee /tmp/build.log

      - name: Deliver artifacts via git (绕开下载 CDN)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build
          git rm -rf . >/dev/null 2>&1 || true
          cp src/EPUBReader.opk EPUBReader.opk 2>/dev/null || true
          cp /tmp/build.log build.log 2>/dev/null || true
          # GDK mini 的 iuxui 菜单只扫描 apps/ 下的「解压文件夹」，不认 .opk 压缩包；
          # 因此额外交付一个解压好的 app 文件夹（package.sh 生成的 src/pkg 内容）
          cp -r src/pkg EPUBReader 2>/dev/null || true
          chmod +x EPUBReader/epubreader EPUBReader/launch.sh 2>/dev/null || true
          # 注意: .opk / epubreader / pkg 都在 .gitignore 里, 用 git add -A 会被忽略而交付不出去;
          # 这里用 -f 强制加入交付物 (orphan 分支, 只放产物)
          git add -f EPUBReader.opk build.log EPUBReader
          git commit -m "ci: deliver $(date -u +%Y%m%dT%H%M%SZ)" >/dev/null 2>&1 \
            && git push origin build --force \
            || echo "nothing to deliver"
